<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Clinical Lounge</title>
  <style>
    :root {
      --color-bg:      #E2DFCC;
      --color-dark:    #455F51;
      --color-accent1: #99CB38;
      --color-accent2: #63A537;
      --color-accent3: #37A76F;
      --color-accent4: #44C1A3;
      --color-accent5: #4EB3CF;
      --color-accent6: #51C3F9;
      --color-warning: #EE7B08;
      --color-white:   #FFFFFF;
    }
    html {
      --border-ui: color-mix(in srgb, var(--color-dark) 16%, var(--color-white));
      --text-muted: color-mix(in srgb, var(--color-dark) 72%, var(--color-bg));
      --text-subtle: color-mix(in srgb, var(--color-dark) 55%, var(--color-bg));
      --shadow-paper: 0 10px 24px color-mix(in srgb, var(--color-dark) 16%, transparent);
    }
    * {
      box-sizing: border-box;
    }
    *:focus-visible {
      outline: 2px solid var(--color-accent6);
      outline-offset: 2px;
    }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
      font-size: 16px;
      line-height: 1.55;
      letter-spacing: 0.02em;
      color: var(--color-dark);
      background: var(--color-bg);
      -webkit-font-smoothing: antialiased;
      position: relative;
    }
    /* 大きな色面＋細帯（セクション9） */
    .scene {
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      overflow: hidden;
    }
    .scene__plane--lime {
      position: absolute;
      width: min(125vw, 52rem);
      height: 46vh;
      top: -8%;
      left: -22%;
      background: color-mix(in srgb, var(--color-accent1) 38%, var(--color-white));
      transform: rotate(-4deg);
    }
    .scene__plane--green {
      position: absolute;
      width: 58vw;
      max-width: 26rem;
      height: min(72vh, 28rem);
      bottom: -14%;
      right: -18%;
      background: color-mix(in srgb, var(--color-accent3) 22%, var(--color-white));
      transform: rotate(5deg);
      border-radius: 0 0 0 18%;
    }
    .scene__band {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: var(--color-accent6);
    }
    .wrap {
      position: relative;
      z-index: 0;
      max-width: min(44rem, 100%);
      margin: 0 auto;
      padding: 2rem 1.35rem 3rem;
    }
    header.site-header {
      margin: 0 0 2.25rem;
      padding: 0 0 1.5rem;
      border-bottom: 3px solid var(--color-dark);
    }
    .site-header__eyebrow {
      margin: 0 0 0.5rem;
      font-size: 0.625rem;
      font-weight: 600;
      letter-spacing: 0.18em;
      color: var(--text-subtle);
    }
    /* タイトル（Lounge）：上位階層 — ティール〜シアン寄りのクールな緑 */
    h1.site-header__title {
      margin: 0 0 0.75rem;
      position: relative;
      display: inline-flex;
      align-items: stretch;
      gap: 0;
      font-family: system-ui, -apple-system, "Segoe UI", "Helvetica Neue", Helvetica, Arial, sans-serif;
      font-size: clamp(1.7rem, 5vw, 2.45rem);
      font-weight: 800;
      line-height: 1.05;
      letter-spacing: 0.03em;
      color: var(--color-white);
      isolation: isolate;
    }
    h1.site-header__title::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0.12em;
      bottom: 0.12em;
      width: 4px;
      background: linear-gradient(
        180deg,
        color-mix(in srgb, var(--color-white) 82%, var(--color-accent6)) 0%,
        var(--color-white) 45%,
        color-mix(in srgb, var(--color-white) 70%, var(--color-accent4)) 100%
      );
      clip-path: polygon(0 0, 100% 6%, 100% 94%, 0 100%);
      transform: skewY(-8deg);
      transform-origin: center left;
      z-index: 1;
      box-shadow: 2px 0 0 color-mix(in srgb, var(--color-dark) 45%, transparent);
    }
    .site-header__title-core {
      display: inline-flex;
      align-items: baseline;
      flex-wrap: wrap;
      gap: 0.18em 0.5em;
      padding: 0.48rem 1rem 0.52rem 1rem;
      margin-left: 0.72rem;
      background: linear-gradient(
        118deg,
        color-mix(in srgb, var(--color-dark) 50%, var(--color-accent3)) 0%,
        color-mix(in srgb, var(--color-accent3) 55%, var(--color-accent4)) 32%,
        color-mix(in srgb, var(--color-accent4) 50%, var(--color-accent5)) 68%,
        color-mix(in srgb, var(--color-accent5) 42%, var(--color-accent6)) 100%
      );
      border: 1px solid color-mix(in srgb, var(--color-dark) 28%, var(--color-accent4));
      box-shadow:
        inset 0 1px 0 color-mix(in srgb, var(--color-white) 28%, transparent),
        0 2px 0 color-mix(in srgb, var(--color-dark) 22%, transparent),
        0 10px 28px color-mix(in srgb, var(--color-dark) 18%, transparent);
      clip-path: polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 0 100%);
    }
    .site-header__title-core em.site-header__title-wa {
      margin: 0;
      font-style: normal;
      font-weight: 700;
      font-size: 0.5em;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: color-mix(in srgb, var(--color-white) 78%, var(--color-accent6));
      line-height: 1;
      border-bottom: 1px solid color-mix(in srgb, var(--color-white) 34%, var(--color-accent5));
      padding-bottom: 0.18em;
    }
    .site-header__title-core strong.site-header__title-wb {
      font-weight: 900;
      letter-spacing: 0.04em;
      text-transform: none;
      background: linear-gradient(
        168deg,
        var(--color-white) 0%,
        color-mix(in srgb, var(--color-white) 86%, var(--color-accent4)) 42%,
        color-mix(in srgb, var(--color-white) 68%, var(--color-accent6)) 100%
      );
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      -webkit-text-fill-color: transparent;
    }
    @supports not (background-clip: text) {
      .site-header__title-core strong.site-header__title-wb {
        color: var(--color-white);
        -webkit-text-fill-color: unset;
        background: none;
      }
    }
    .lede {
      margin: 0;
      max-width: 36em;
      font-size: 0.875rem;
      line-height: 1.55;
      color: var(--text-muted);
    }
    main {
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }
    .desk {
      margin: 0;
    }
    /* デスク見出し：下位階層 — オリーブ〜ライム寄りのウォームな緑（Lounge より黄緑寄り） */
    h2.desk-title {
      margin: 0 0 0.45rem;
      position: relative;
      display: inline-flex;
      align-items: stretch;
      max-width: 100%;
      font-size: clamp(0.95rem, 2.8vw, 1.125rem);
      font-weight: 800;
      line-height: 1.12;
      letter-spacing: 0.02em;
      color: var(--color-white);
      isolation: isolate;
    }
    h2.desk-title::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0.1em;
      bottom: 0.1em;
      width: 3px;
      background: linear-gradient(
        180deg,
        color-mix(in srgb, var(--color-white) 78%, var(--color-accent1)) 0%,
        var(--color-white) 48%,
        color-mix(in srgb, var(--color-white) 72%, var(--color-accent2)) 100%
      );
      clip-path: polygon(0 0, 100% 6%, 100% 94%, 0 100%);
      transform: skewY(-8deg);
      transform-origin: center left;
      z-index: 1;
      box-shadow: 2px 0 0 color-mix(in srgb, var(--color-dark) 45%, transparent);
    }
    .desk-title__core {
      display: inline-flex;
      align-items: baseline;
      flex-wrap: wrap;
      gap: 0.2em 0.55em;
      padding: 0.38rem 0.85rem 0.42rem 0.85rem;
      margin-left: 0.65rem;
      max-width: 100%;
      background: linear-gradient(
        128deg,
        color-mix(in srgb, var(--color-dark) 58%, var(--color-accent2)) 0%,
        color-mix(in srgb, var(--color-dark) 22%, var(--color-accent2)) 28%,
        color-mix(in srgb, var(--color-accent2) 75%, var(--color-accent1)) 62%,
        color-mix(in srgb, var(--color-accent1) 58%, var(--color-bg)) 100%
      );
      border: 1px solid color-mix(in srgb, var(--color-dark) 38%, var(--color-accent2));
      box-shadow:
        inset 0 1px 0 color-mix(in srgb, var(--color-white) 26%, transparent),
        0 2px 0 color-mix(in srgb, var(--color-dark) 22%, transparent),
        0 8px 22px color-mix(in srgb, var(--color-dark) 16%, transparent);
      clip-path: polygon(0 0, calc(100% - 8px) 0, 100% 8px, 100% 100%, 0 100%);
    }
    h2.desk-title em.desk-title__type {
      margin: 0;
      font-style: normal;
      font-family: system-ui, -apple-system, "Segoe UI", "Helvetica Neue", Helvetica, Arial, sans-serif;
      font-weight: 700;
      font-size: 0.58em;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: color-mix(in srgb, var(--color-white) 80%, var(--color-accent1));
      line-height: 1;
      border-bottom: 1px solid color-mix(in srgb, var(--color-white) 32%, var(--color-accent2));
      padding-bottom: 0.15em;
    }
    h2.desk-title strong.desk-title__name {
      font-family: "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
      font-weight: 900;
      letter-spacing: 0.03em;
      font-size: 1.05em;
      background: linear-gradient(
        168deg,
        var(--color-white) 0%,
        color-mix(in srgb, var(--color-white) 90%, var(--color-accent1)) 50%,
        color-mix(in srgb, var(--color-white) 72%, var(--color-accent2)) 100%
      );
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      -webkit-text-fill-color: transparent;
    }
    @supports not (background-clip: text) {
      h2.desk-title strong.desk-title__name {
        color: var(--color-white);
        -webkit-text-fill-color: unset;
        background: none;
      }
    }
    .desk-lede {
      margin: 0 0 0.6rem;
      padding-left: 0;
      font-size: 0.8125rem;
      color: var(--text-muted);
      line-height: 1.45;
    }
    .tool-panel {
      margin: 0;
      border: 1px solid var(--border-ui);
      background: var(--color-white);
      border-radius: 10px;
      box-shadow: var(--shadow-paper);
      overflow: hidden;
    }
    .tool-list {
      list-style: none;
      margin: 0;
      padding: 0;
    }
    .tool-list li {
      margin: 0;
      border-top: 1px solid var(--border-ui);
    }
    .tool-list li:first-child {
      border-top: 0;
    }
    a.tool-link {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem 1rem;
      min-height: 3.35rem;
      padding: 0.7rem 1rem 0.7rem 0.85rem;
      text-decoration: none;
      color: inherit;
      border-left: 3px solid transparent;
      background: var(--color-white);
      transition: background-color 0.12s ease, border-left-color 0.12s ease;
    }
    a.tool-link:hover {
      background: color-mix(in srgb, var(--color-accent1) 12%, var(--color-white));
      border-left-color: var(--color-accent2);
    }
    .tool-link__body {
      min-width: 0;
      flex: 1;
    }
    .tool-link__title {
      margin: 0 0 0.15rem;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      color: var(--color-dark);
      line-height: 1.3;
    }
    .tool-link__desc {
      margin: 0;
      font-size: 0.75rem;
      color: var(--text-muted);
      line-height: 1.4;
    }
    .tool-link__mark {
      flex-shrink: 0;
      font-size: 0.875rem;
      font-weight: 700;
      color: var(--text-subtle);
    }
    a.tool-link:hover .tool-link__mark {
      color: var(--color-accent6);
    }
    .portal-error {
      margin: 0;
      padding: 1rem 1rem 1.05rem;
      border: 1px solid var(--border-ui);
      background: color-mix(in srgb, var(--color-warning) 12%, var(--color-white));
      border-radius: 10px;
      box-shadow: var(--shadow-paper);
      color: var(--color-dark);
    }
    .portal-error__title {
      margin: 0 0 0.5rem;
      font-size: 0.9375rem;
      font-weight: 800;
    }
    .portal-error__body {
      margin: 0;
      font-size: 0.8125rem;
      line-height: 1.5;
      color: var(--text-muted);
    }
    .footer-meta {
      margin: 0.35rem 0 0;
    }
    footer {
      margin-top: 2.5rem;
      padding-top: 0.85rem;
      border-top: 1px solid var(--border-ui);
      font-size: 0.6875rem;
      color: var(--text-subtle);
      line-height: 1.5;
    }
    footer code {
      font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      font-size: 0.8125em;
      padding: 0.08em 0.3em;
      border-radius: 0;
      background: color-mix(in srgb, var(--color-dark) 5%, var(--color-white));
      border: 1px solid var(--border-ui);
      color: var(--color-dark);
    }
  </style>
</head>
<body>
  <div class="scene" aria-hidden="true">
    <div class="scene__plane scene__plane--lime"></div>
    <div class="scene__plane scene__plane--green"></div>
    <div class="scene__band"></div>
  </div>
  <div class="wrap">
    <header class="site-header">
      <p class="site-header__eyebrow">臨床補助ツールの入口</p>
      <h1 class="site-header__title" lang="en" aria-label="Clinical Lounge">
        <span class="site-header__title-core">
          <em class="site-header__title-wa">Clinical</em>
          <strong class="site-header__title-wb">Lounge</strong>
        </span>
      </h1>
      <p class="lede">役割・分野ごとの<strong lang="en">Clinical desk</strong>からツールを選びます。</p>
    </header>
    <main id="portal-main" aria-live="polite"></main>
    <footer>
      <p>場所: <code>06_product/クリニカルラウンジ/portal/index.html</code> — 入口としてブックマークできます。</p>
      <p id="footer-meta" class="footer-meta"></p>
      <p>変更の一覧: ひとつ上のフォルダの <code>CHANGELOG.md</code></p>
    </footer>
  </div>
  <script>
    (function () {
      var mainEl = document.getElementById("portal-main");
      var footerMeta = document.getElementById("footer-meta");

      function loadScript(src) {
        return new Promise(function (resolve, reject) {
          var s = document.createElement("script");
          s.src = src;
          s.async = true;
          s.onload = function () {
            resolve();
          };
          s.onerror = function () {
            reject(new Error("script load failed: " + src));
          };
          document.head.appendChild(s);
        });
      }

      function fetchManifest() {
        return fetch("desks.json", { cache: "no-store" }).then(function (res) {
          if (!res.ok) {
            throw new Error("desks.json HTTP " + res.status);
          }
          return res.json();
        });
      }

      function loadManifestWithFallback() {
        return fetchManifest().catch(function () {
          if (window.PORTAL_MANIFEST) {
            return Promise.resolve(window.PORTAL_MANIFEST);
          }
          return loadScript("manifest.js").then(function () {
            if (!window.PORTAL_MANIFEST) {
              throw new Error("PORTAL_MANIFEST missing after manifest.js");
            }
            return window.PORTAL_MANIFEST;
          });
        });
      }

      function validateManifest(data) {
        if (!data || typeof data !== "object") {
          return "マニフェストの形式が不正です。";
        }
        if (!Array.isArray(data.desks)) {
          return "desks が配列ではありません。";
        }
        for (var i = 0; i < data.desks.length; i++) {
          var d = data.desks[i];
          if (!d || typeof d.id !== "string" || !d.id.trim()) {
            return "デスク " + i + " の id が不正です。";
          }
          if (typeof d.name !== "string") {
            return "デスク " + i + " の name が不正です。";
          }
          if (!Array.isArray(d.tools)) {
            return "デスク " + i + " の tools が配列ではありません。";
          }
          for (var j = 0; j < d.tools.length; j++) {
            var t = d.tools[j];
            if (!t || typeof t.href !== "string" || !t.href.trim()) {
              return "ツール (" + i + "," + j + ") の href が不正です。";
            }
            if (typeof t.title !== "string") {
              return "ツール (" + i + "," + j + ") の title が不正です。";
            }
          }
        }
        return null;
      }

      function setFooterMeta(data) {
        if (!footerMeta) {
          return;
        }
        var v = data.version != null ? String(data.version) : "—";
        var u = data.updated != null ? String(data.updated) : "—";
        footerMeta.textContent = "マニフェスト: 版 " + v + "（更新日: " + u + "）";
      }

      function renderError(message) {
        mainEl.innerHTML = "";
        var box = document.createElement("div");
        box.className = "portal-error";
        box.setAttribute("role", "alert");
        var h = document.createElement("p");
        h.className = "portal-error__title";
        h.textContent = "一覧を読み込めませんでした";
        var p = document.createElement("p");
        p.className = "portal-error__body";
        p.textContent = message;
        box.appendChild(h);
        box.appendChild(p);
        mainEl.appendChild(box);
      }

      function renderDesks(data) {
        mainEl.innerHTML = "";
        data.desks.forEach(function (desk) {
          var section = document.createElement("section");
          section.className = "desk";
          section.setAttribute("aria-labelledby", desk.id);

          var h2 = document.createElement("h2");
          h2.id = desk.id;
          h2.className = "desk-title";
          var label = (desk.roleLabel || "Clinical desk").trim() || "Clinical desk";
          h2.setAttribute("aria-label", label + " — " + desk.name);

          var core = document.createElement("span");
          core.className = "desk-title__core";

          var role = document.createElement("em");
          role.className = "desk-title__type";
          role.setAttribute("lang", "en");
          role.textContent = label;

          var name = document.createElement("strong");
          name.className = "desk-title__name";
          name.textContent = desk.name;

          core.appendChild(role);
          core.appendChild(name);
          h2.appendChild(core);

          var lede = document.createElement("p");
          lede.className = "desk-lede";
          lede.textContent = desk.lede || "";

          var panel = document.createElement("div");
          panel.className = "tool-panel";
          var ul = document.createElement("ul");
          ul.className = "tool-list";

          (desk.tools || []).forEach(function (tool) {
            var li = document.createElement("li");
            var a = document.createElement("a");
            a.className = "tool-link";
            a.href = tool.href;

            var body = document.createElement("div");
            body.className = "tool-link__body";
            var pt = document.createElement("p");
            pt.className = "tool-link__title";
            pt.textContent = tool.title;
            var pd = document.createElement("p");
            pd.className = "tool-link__desc";
            pd.textContent = tool.desc || "";
            body.appendChild(pt);
            body.appendChild(pd);

            var mark = document.createElement("span");
            mark.className = "tool-link__mark";
            mark.setAttribute("aria-hidden", "true");
            mark.textContent = "→";

            a.appendChild(body);
            a.appendChild(mark);
            li.appendChild(a);
            ul.appendChild(li);
          });

          panel.appendChild(ul);
          section.appendChild(h2);
          section.appendChild(lede);
          section.appendChild(panel);
          mainEl.appendChild(section);
        });
      }

      loadManifestWithFallback()
        .then(function (data) {
          var err = validateManifest(data);
          if (err) {
            renderError(err);
            return;
          }
          setFooterMeta(data);
          renderDesks(data);
        })
        .catch(function () {
          renderError(
            "desks.json の取得に失敗し、manifest.js も読み込めませんでした。portal フォルダに desks.json と manifest.js があるか確認してください。"
          );
        });
    })();
  </script>
</body>
</html>
